version: 0.1.0

document:
  key: secret-and-credential-management
  status: active
  purpose: >
    Define how API keys, auth tokens, signing credentials, registry passwords,
    and other sensitive values are stored, resolved, rotated, redacted, and
    exported so implementation does not fall back to plaintext YAML or ad-hoc
    secret handling.
  extends:
    - doc/3. Platform/05-system-contracts.yaml
    - doc/3. Platform/07-control-plane-and-observability.yaml
    - doc/3. Platform/10-browser-terminal-and-ide-foundation.yaml

decision-summary:
  - secret values never live in workspace YAML, project YAML, worklog, or ordinary action logs
  - human-readable secret_ref keys identify secrets; only the host secret service can resolve them
  - desktop secret storage is host-managed in Electron main process and protected at rest with Electron safeStorage
  - release-signing credentials are isolated from project runtime secrets
  - import and export move references and metadata by default, not live secret values
  - degraded secret backends are explicit and blocked by default for production use

secret-classes:
  - auth-provider-client-secret
  - auth-refresh-token
  - api-key
  - project-cli-env-secret
  - package-registry-credential
  - release-signing-credential
  - callback-proof-material

scope-model:
  - global-workspace
  - project
  - session
  - release

storage-model:
  value-storage:
    owner: runtime host only
    rules:
      - renderer, TextualCLIHost, Skill, MCP, and external packages never read raw persistent secret files directly
      - desktop secret values are encrypted for local storage with Electron safeStorage in the main process
      - if safeStorage is unavailable, persistent secret writes are blocked unless an explicit dev-only override is enabled
      - if safeStorage reports the Linux backend as basic_text, the app treats persistent secret storage as degraded mode and denies production use
  metadata-storage:
    allowed_fields:
      - secret_ref
      - secret_class
      - scope
      - owner_key
      - created_at
      - rotated_at
      - export_policy
      - resolution_policy
    forbidden_fields:
      - raw_secret_value
      - refresh_token_value
      - auth_code_value
      - signing_private_key_material

resolution-policy:
  rules:
    - only the host secret service resolves secret_ref to a raw value
    - resolved secrets are handed to downstream code as late as possible
    - long-lived secrets should be injected as environment material or one-shot request parameters, not stored in renderer state
    - session-scoped secrets should be disposed when the session ends or the action finishes

redaction-policy:
  must-redact:
    - api keys
    - oauth authorization codes
    - refresh tokens
    - access tokens unless an explicit secure debugging mode is enabled
    - package registry passwords
    - signing credentials
  log-rules:
    - action logs store secret_ref or redacted placeholders only
    - audit logs may record that a secret was accessed, rotated, or revoked, but not the value
    - copied or pasted content that matches secret heuristics must be treated as sensitive until reviewed

lifecycle:
  create:
    - generate readable secret_ref
    - store secret metadata
    - write protected value through host secret service
  rotate:
    - update raw value without changing the logical owning scope unless policy requires a new ref
    - record rotated_at and rotation reason in audit trails
  revoke:
    - delete stored value
    - mark dependent auth or package sessions stale
  recover:
    - restore metadata from backup
    - require manual rebinding of raw secret values unless a protected secret backup workflow is explicitly enabled

import-export-policy:
  defaults:
    - project export includes secret_ref bindings and metadata only
    - imported projects arrive with unresolved secret refs until rebound
    - session-only secrets are never exported
  production-rules:
    - raw secrets are excluded from ordinary backups and project sharing flows
    - any protected full-workspace backup must be operator-confirmed and separately encrypted

release-credential-policy:
  rules:
    - code-signing credentials are managed in a release scope separate from ordinary project runtime secrets
    - release signing material must not be exposed to project modules, AI actions, or browser/terminal sessions
    - CI release credentials should be injected by the release environment, not copied into workspace files

failure-modes:
  degraded-secret-backend:
    policy: block persistent production secrets, allow explicit dev override only
  missing-secret-ref:
    policy: fail closed and surface a rebind action
  redaction-failure:
    policy: treat as security incident and block export or publish paths until cleared

references:
  electron:
    - https://www.electronjs.org/docs/latest/api/safe-storage/
