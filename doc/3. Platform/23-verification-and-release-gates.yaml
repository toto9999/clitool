version: 0.1.0

document:
  key: verification-and-release-gates
  status: active
  purpose: >
    Define the proof points that must pass before architecture claims are
    considered real and before packaged releases are allowed.
  extends:
    - doc/3. Platform/12-browser-automation-and-playwright-mcp.yaml
    - doc/3. Platform/22-build-packaging-and-update.yaml

decision-summary:
  - every high-risk subsystem gets a concrete gate, not just an intention
  - PoC gates come before broad feature implementation
  - release gates include docs, package, runtime, and security checks

verification_tiers:
  purpose: >
    Separate repository/build proof from live guest-application proof. Calling
    `batcli verify` success does not imply VM availability, an interactive
    desktop session, or that GenNX (GEN) ran on screen.
  tiers:
    - tier_key: repo_static
      summary: Documentation and compile-time/build artifact gates.
      typical_commands:
        - batcli docs validate
        - batcli typecheck
        - batcli build
        - batcli verify
      excludes:
        - VM guest boot and connectivity
        - interactive user session / visible UI automation surface
        - guest EXE process launch (GenNX or other targets)
        - FlaUI or UiaPeek steps against a live target PID
    - tier_key: gennx_guest_runtime
      summary: >
        Proof that GenNX runs in a suitable Windows guest context and UIA
        automation can act on the live process. Required for any claim of
        "GEN 동작 검증" or GenNX macro verification completeness.
      prerequisites:
        - Windows guest with an interactive session policy that allows UI automation (local console or VM with display/session rules met)
        - GenNX installed and executable at a resolved path (see batcli vm gennx resolve-config and vm-gennx-guest-exe-resolution.yaml)
        - UIA executor venv (`batcli uia-executor install`), `target-gennx` (or chosen key) in `workspace/uia-macros.yaml` with a resolvable `exe_path`; Electron shell is optional when using `scripts/uia-macro-cli.mjs` or `batcli uia gennx verify` (loads `dist-electron` uia-macro-service in-process; see `28-desktop-uia-macro-verification.yaml`)
      not_sufficient:
        - batcli verify passing alone
        - batcli vm gennx resolve-config emitting JSON without launching the exe or running steps
      proof_examples:
        - batcli vm gennx verify-guest --vm_profile_key vm-gennx-lab (Hyper-V host: Start-VM, then PowerShell Direct -VMName to run batcli uia gennx verify on guest; requires CLIBASE_VM_WINRM_USER/PASSWORD for guest admin, guest repo with node and uia-executor)
        - batcli uia gennx verify (same FlaUI body on the machine where the command runs — use inside an interactive VM/RDP session if GenNX is only on the guest)
        - uia.target.launch for target-gennx (or equivalent) with a running process and visible window when the scenario requires UI
        - uia.macro.run or flaui.* steps completing against the target PID via cli-host/uia-executor/run_step.py
        - scripted smoke such as scripts/uia-verification-smoke.mjs against the chosen target when the operator enables full runtime mode with Electron

gate-stages:
  - architecture-poc
  - implementation-ready
  - release-candidate
  - stable-release

architecture-poc-gates:
  - gate_key: gate-electron-shell-boot
    requirement: Electron main, preload, and renderer start together on Windows
  - gate_key: gate-workspace-yaml-roundtrip
    requirement: workspace and project YAML load-save-load is deterministic
  - gate_key: gate-textual-cli-boot
    requirement: TextualCLIHost launches and exchanges a minimal action with the control plane
  - gate_key: gate-terminal-pty-windows
    requirement: PTY session create, input, resize, and exit work on Windows
  - gate_key: gate-browser-webcontentsview
    requirement: visible WebContentsView loads and reports navigation events safely
  - gate_key: gate-browser-same-surface-automation
    requirement: currently visible browser surface can be controlled through the host-owned automation bridge
  - gate_key: gate-auth-callback
    requirement: system-browser auth flow returns through callback handling and stores no plaintext token in YAML
  - gate_key: gate-secret-storage
    requirement: secret_ref resolution works and logs remain redacted
  - gate_key: gate-project-ingress-routing
    requirement: one-project-one-ingress route works through the gateway without ad-hoc public ports

implementation-ready-gates:
  - docs validate passes
  - typecheck passes
  - production build passes
  - no required architecture doc is stale relative to implementation scope
  - all new stable features have cli projection and policy coverage

release-candidate-gates:
  - packaged app launches on target OS
  - installer or packaged artifact smoke test passes
  - native modules load in packaged environment
  - secrets remain inaccessible from renderer-only paths
  - startup, project open, terminal launch, browser launch, and log viewing smoke scenarios pass

stable-release-gates:
  - signed artifact available for supported production platforms
  - release notes and rollback metadata prepared
  - update path verified for supported channels
  - no blocker security or data-loss issue open

failure-policy:
  rules:
    - failing an architecture-poc gate blocks dependent implementation rollout
    - failing a release gate blocks publish even if the app builds
    - temporary waivers must be explicit, time-bounded, and recorded in audit or release notes
