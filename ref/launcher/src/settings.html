<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launcher Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <div class="backdrop" id="backdrop" role="presentation"></div>
    <main class="settings-dialog" role="dialog" aria-modal="true" aria-label="Settings">
      <header class="settings-header">
        <h1>Settings</h1>
        <button id="close-settings" class="icon-button" type="button" aria-label="close settings" title="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <section class="settings-body">
        <div id="admin-diagnostics" class="settings-group settings-group--admin" hidden>
          <label class="settings-label">Diagnostics (admin)</label>
          <p class="settings-hint">Runtime mode and current browser URL. Change mode in launcher.env and restart.</p>
          <dl class="diag-list">
            <dt>Mode</dt>
            <dd id="diag-mode" class="diag-value"></dd>
            <dt>Browser URL</dt>
            <dd id="diag-url" class="diag-value diag-value--mono"></dd>
          </dl>
        </div>
        <div class="settings-group">
          <label class="settings-label">Theme</label>
          <div class="theme-row">
            <button id="theme-dark" class="theme-btn" type="button" data-theme="dark" aria-pressed="false">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              Dark
            </button>
            <button id="theme-light" class="theme-btn" type="button" data-theme="light" aria-pressed="false">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
              Light
            </button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./settingsView.js"></script>
  </body>
</html>
